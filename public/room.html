<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎤 غرفة صوتية - AirChat</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(to bottom, #1c1c2b, #2e2e47);
      color: white;
      font-family: 'Tajawal', sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .room-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      justify-items: center;
      max-width: 800px;
      margin: auto;
    }

    .mic-circle {
      background: #333;
      border: 3px solid #3af;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .mic-circle:hover {
      transform: scale(1.05);
      border-color: #4fc;
    }

    .mic-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 5px;
      border: 2px solid white;
    }

    .mic-name {
      font-size: 14px;
      font-weight: bold;
    }

    .mic-id {
      font-size: 11px;
      color: #ccc;
    }

    .mic-host {
      position: absolute;
      top: -10px;
      right: -10px;
      background: gold;
      color: black;
      font-size: 12px;
      font-weight: bold;
      border-radius: 8px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>

  <h1>🎧 غرفة الصوت - AirChat</h1>

  <div class="room-container" id="mic-container">
    <!-- الدوائر سيتم توليدها هنا -->
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const micContainer = document.getElementById('mic-container');
    const socket = io();

    const users = [
      { name: 'نجم', id: 'xA1', isHost: true },
      { name: 'صقر', id: 'bF9', isHost: false },
      { name: 'مرحبا', id: 'c3Z', isHost: false },
      { name: 'أمل', id: 'z7Q', isHost: false },
      { name: 'ضيف', id: 'g8Y', isHost: false },
      { name: 'ضيف', id: 'm2R', isHost: false },
    ];

    users.forEach(user => {
      const div = document.createElement('div');
      div.className = 'mic-circle';

      div.innerHTML = `
        ${user.isHost ? `<div class="mic-host">مضيف</div>` : ''}
        <img src="avatar.jpg" class="mic-avatar" />
        <div class="mic-name">${user.name}</div>
        <div class="mic-id">ID: ${user.id}</div>
      `;

      micContainer.appendChild(div);
    });
  </script>
</body>
</html>
