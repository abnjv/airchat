<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎤 غرفة صوتية - AirChat</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(to bottom, #1c1c2b, #2e2e47);
      color: white;
      font-family: 'Tajawal', sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .room-info {
      margin-bottom: 20px;
      font-size: 16px;
      color: #aaa;
    }

    .mic-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .mic-circle {
      background: #333;
      border: 3px solid #3af;
      border-radius: 50%;
      width: 110px;
      height: 110px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .mic-circle:hover {
      transform: scale(1.05);
      border-color: #4fc;
    }

    .mic-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 5px;
      border: 2px solid white;
    }

    .mic-name {
      font-size: 13px;
      font-weight: bold;
    }

    .mic-id {
      font-size: 10px;
      color: #ccc;
    }

    .mic-host {
      position: absolute;
      top: -10px;
      right: -10px;
      background: gold;
      color: black;
      font-size: 11px;
      font-weight: bold;
      border-radius: 8px;
      padding: 2px 6px;
    }

    @media (max-width: 600px) {
      .mic-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>🎧 غرفة الصوت - AirChat</h1>
  <div class="room-info" id="roomInfo">جارٍ تحميل الغرفة...</div>

  <div class="mic-grid" id="mic-container">
    <!-- الدوائر ستولد تلقائيًا -->
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const micContainer = document.getElementById('mic-container');
    const roomInfo = document.getElementById('roomInfo');
    const socket = io();

    const username = localStorage.getItem("username") || "مستخدم مجهول";
    const roomName = localStorage.getItem("room") || "غرفتي";
    const roomPass = localStorage.getItem("roomPass") || "";

    // عرض اسم الغرفة
    roomInfo.innerHTML = `📛 الغرفة: <b>${roomName}</b>`;

    // إرسال معلومات الانضمام
    socket.emit("joinRoom", { username, room: roomName, pass: roomPass });

    // إنشاء 10 مايكات (المضيف + 9 أماكن)
    const users = [];

    users.push({ name: username, id: socket.id.slice(0, 4), isHost: true });
    for (let i = 1; i < 10; i++) {
      users.push({ name: "فارغ", id: "--", isHost: false });
    }

    users.forEach((user, index) => {
      const div = document.createElement('div');
      div.className = 'mic-circle';

      div.innerHTML = `
        ${user.isHost ? `<div class="mic-host">مضيف</div>` : ''}
        <img src="avatar.jpg" class="mic-avatar" />
        <div class="mic-name">${user.name}</div>
        <div class="mic-id">ID: ${user.id}</div>
      `;

      micContainer.appendChild(div);
    });
  </script>
</body>
</html>
