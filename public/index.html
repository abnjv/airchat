<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎤 دردشة صوتية - AirChat</title>
  <script src="/socket.io/socket.io.js"></script>
  <script defer src="script.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎤 دردشة صوتية - <b>AirChat</b></h1>

  <!-- واجهة الدخول -->
  <div id="login">
    <img id="avatar-preview" src="avatar.jpg" alt="صورة المستخدم">
    <input type="text" id="username" placeholder="🧑‍💻 اكتب اسمك للدخول" />
    <br />
    <button id="joinBtn">✅ دخول الغرفة</button>
  </div>

  <!-- واجهة الغرفة -->
  <div id="room">
    <p id="status">🔊 تم الاتصال بالغرفة</p>
    <button id="leaveBtn">🚪 خروج من الغرفة</button>

    <div id="userList">
      <strong>🎧 المستخدمون في الغرفة:</strong>
      <div id="users" class="circle-container"></div>
    </div>
  </div>

</body>
</html>
